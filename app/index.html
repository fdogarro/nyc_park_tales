<!DOCTYPE html>
<html lang="en" ng-app="signApp">
  <head>
    <meta charset="utf-8"/>
    <title>NYC Park Tales</title>
    <link href="css/bootstrap.min.css" rel="stylesheet"/>
    <link href='http://fonts.googleapis.com/css?family=Abril+Fatface' rel='stylesheet' type='text/css'>
    <link href="css/app.css" rel="stylesheet"/>
    <script src="lib/angular/angular.min.js"></script>
    <script src="lib/angular/angular.min.js.map"></script>
    <script src="lib/jquery/jquery-1.10.2.min.js"></script>
    <script src="js/controllers.js"></script>
    <script src="js/main.js"></script>
  </head>
  <body ng-controller="SignCtrl">
    <div class="container-fluid">
      <div class="jumbo">  
        <h1>NYC Park Tales</h1>
        <p>The stories behind some of New York's Most Hidden Treasures.</p>
        <input id="search" type="text" ng-model="query"/>
        <select ng-model="orderProp">
          <option value="name">Alphabetical</option>
          <option value="borough">Borough</option>
        </select>
      </div>
      <div class="sign-container container">
        <!-- <div class="col-md-10"> -->
        <ul>
          <li ng-repeat="sign in signs | filter:query" class ="sign">
          <!--   <img ng-src="#"/> -->
            <div class="info">
              <h4>{{sign.name}}</h4>
              <p>{{sign.borough}}</p>
              <p class="text-shorten">{{sign.content}}</p>
            </div>
        </ul>
     <!--  </div> -->
    </div>
  </body>
</html>
